name: Build and Release

on:
  workflow_dispatch:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleRelease printVersionInfo | tee version_info.txt

    - name: Sign APK
      uses: r0adkll/sign-android-release@v1
      with:
        releaseDirectory: ${{ github.workspace }}/app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.KEY64 }}
        alias: ${{ secrets.ALIAS }}
        keyStorePassword: ${{ secrets.KEY }}
        keyPassword: ${{ secrets.KEY }}
      env:
        BUILD_TOOLS_VERSION: "36.1.0"

    - name: Resolve release metadata
      run: |
        VERSION_NAME=$(grep -oP '(?<=VERSION_NAME=).+' version_info.txt)
        SHORT_SHA=$(echo "${{ github.sha }}" | head -c 7)
        if [ "${{ github.ref_type }}" = "tag" ]; then
          RELEASE_TAG="${{ github.ref_name }}"
        else
          RELEASE_TAG="manual-${VERSION_NAME}-${SHORT_SHA}"
        fi
        APK_NAME="Pixelify-Google-Photos-${RELEASE_TAG}.apk"
        {
          echo "VERSION_NAME=$VERSION_NAME"
          echo "RELEASE_TAG=$RELEASE_TAG"
          echo "APK_NAME=$APK_NAME"
        } >> "$GITHUB_ENV"

    - name: Rename
      run: mv "${{ github.workspace }}/app/build/outputs/apk/release/app-release-unsigned-signed.apk" "${{ github.workspace }}/app/build/outputs/apk/release/${{ env.APK_NAME }}"

    - name: Upload built apk
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APK_NAME }}
        path: ${{ github.workspace }}/app/build/outputs/apk/release/${{ env.APK_NAME }}

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        name: Pixelify Google Photos ${{ env.VERSION_NAME }}
        draft: false
        prerelease: false
        files: ${{ github.workspace }}/app/build/outputs/apk/release/${{ env.APK_NAME }}
