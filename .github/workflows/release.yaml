name: Build and Release

on:
  workflow_dispatch:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

env:
  BUILD_TOOLS_VERSION: "36.1.0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Android SDK
      uses: android-actions/setup-android@v4

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleRelease printVersionInfo | tee version_info.txt

    - name: Sign APK
      env:
        KEYSTORE_B64: ${{ secrets.KEY64 }}
        KEYSTORE_PASS: ${{ secrets.KEY }}
        KEY_ALIAS: ${{ secrets.ALIAS }}
      run: |
        KEYSTORE="$RUNNER_TEMP/release.jks"
        printf '%s' "$KEYSTORE_B64" | base64 --decode > "$KEYSTORE"
        APKSIGNER="$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner"
        UNSIGNED="app/build/outputs/apk/release/app-release-unsigned.apk"
        SIGNED="app/build/outputs/apk/release/app-release-signed.apk"
        "$APKSIGNER" sign \
          --ks "$KEYSTORE" \
          --ks-key-alias "$KEY_ALIAS" \
          --ks-pass "pass:$KEYSTORE_PASS" \
          --key-pass "pass:$KEYSTORE_PASS" \
          --out "$SIGNED" \
          "$UNSIGNED"
        "$APKSIGNER" verify --verbose "$SIGNED"
        rm -f "$KEYSTORE"

    - name: Resolve release metadata
      run: |
        VERSION_NAME=$(grep -oP '(?<=VERSION_NAME=).+' version_info.txt)
        SHORT_SHA=$(echo "${{ github.sha }}" | head -c 7)
        if [ "${{ github.ref_type }}" = "tag" ]; then
          RELEASE_TAG="${{ github.ref_name }}"
        else
          RELEASE_TAG="manual-${VERSION_NAME}-${SHORT_SHA}"
        fi
        APK_NAME="Pixelify-Google-Photos-${RELEASE_TAG}.apk"
        {
          echo "VERSION_NAME=$VERSION_NAME"
          echo "RELEASE_TAG=$RELEASE_TAG"
          echo "APK_NAME=$APK_NAME"
        } >> "$GITHUB_ENV"

    - name: Extract release notes from CHANGELOG.md
      run: |
        if [ -f CHANGELOG.md ]; then
          # First section between two top-level headers (## ...), excluding the header line itself.
          awk '/^## /{ if (++c > 1) exit; next } c==1' CHANGELOG.md > .release_notes.md
          if [ ! -s .release_notes.md ]; then
            echo "_Release notes not found in CHANGELOG.md; see commit history._" > .release_notes.md
          fi
        else
          echo "_See commit history._" > .release_notes.md
        fi
        echo "---- release notes ----"
        cat .release_notes.md
        echo "-----------------------"

    - name: Rename signed APK
      run: mv "app/build/outputs/apk/release/app-release-signed.apk" "app/build/outputs/apk/release/${{ env.APK_NAME }}"

    - name: Upload built apk
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.APK_NAME }}
        path: app/build/outputs/apk/release/${{ env.APK_NAME }}

    - name: Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        name: Pixelify Google Photos ${{ env.VERSION_NAME }}
        body_path: .release_notes.md
        draft: false
        prerelease: false
        files: app/build/outputs/apk/release/${{ env.APK_NAME }}
